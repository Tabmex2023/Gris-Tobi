<!DOCTYPE html>
<html lang="de">
<head>
  <!-- PWA / APP -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Griselda & Tobias">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griselda & Tobias </title>

<style>
  .countdown-wrapper {
  margin-top: 40px;
  text-align: center;
}

.countdown-title {
  font-size: 1.1rem;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.countdown {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.countdown div {
  background: rgba(255,255,255,0.85);
  padding: 15px 18px;
  border-radius: 14px;
  min-width: 75px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.countdown span {
  display: block;
  font-size: 1.8rem;
  font-weight: bold;
}

.countdown small {
  font-size: 0.7rem;
  letter-spacing: 1px;
  opacity: 0.8;
}
:root {
  --wine: #7a1e2c;
  --sand: #f4efe9;
  --overlay: rgba(244,239,233,0.9);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Georgia", "Times New Roman", serif;
  background: var(--sand);
  color: var(--wine);
  height: 100vh;
}

/* HERO BACKGROUND */
.hero {
  position: fixed;
  inset: 0;
  background:
    linear-gradient(var(--overlay), var(--overlay)),
    url("hero.jpg") center / cover no-repeat;
  z-index: -1;
}

/* MAIN */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 30px;
}

/* ANIMATION BASICS */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1.1s ease;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* TITLES */
h1 {
  font-size: clamp(2.4rem, 6vw, 3.4rem);
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.date {
  font-size: 1.2rem;
  letter-spacing: 3px;
  margin-bottom: 6px;
}

.place {
  font-size: 1rem;
  letter-spacing: 2px;
  margin-bottom: 60px;
}

/* LANGUAGES */
.languages {
  display: flex;
  gap: 50px;
  flex-wrap: wrap;
  justify-content: center;
}

/* LANGUAGE CARD */
.lang-card {
  width: 230px;
  height: 280px;
  background: rgba(255,255,255,0.88);
  border-radius: 18px;
  overflow: hidden;
  text-decoration: none;
  color: var(--wine);
  box-shadow: 0 18px 40px rgba(0,0,0,0.2);
  transition: transform 0.4s ease;
}

.lang-card:hover {
  transform: translateY(-8px);
}

/* LEFT / RIGHT ANIMATION */
.from-left {
  transform: translateX(-120px);
  opacity: 0;
}

.from-right {
  transform: translateX(120px);
  opacity: 0;
}

.from-left.active,
.from-right.active {
  transform: translateX(0);
  opacity: 1;
}

/* FLAG IMAGES */
.lang-image {
  height: 180px;
  background-size: cover;
  background-position: center;
}

.flag-mx {
  background-image: url("https://upload.wikimedia.org/wikipedia/commons/f/fc/Flag_of_Mexico.svg");
}

.flag-de {
  background-image: url("https://upload.wikimedia.org/wikipedia/en/b/ba/Flag_of_Germany.svg");
}

.lang-title {
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.35rem;
  letter-spacing: 2px;
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 25px;
  font-size: 0.85rem;
  opacity: 0.75;
  letter-spacing: 1px;
}

/* MOBILE */
@media (max-width: 600px) {
  .languages {
    gap: 30px;
  }

  .lang-card {
    width: 190px;
    height: 240px;
  }

  .lang-image {
    height: 150px;
  }
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="container">

  <h1 class="reveal">Griselda & Tobias</h1>
  <div class="date reveal" style="transition-delay:0.2s;">10 · 04 · 2027</div>
  <div class="place reveal" style="transition-delay:0.4s;">Guamúchil, Sinaloa</div>
  <div class="countdown-wrapper">
  <div class="countdown-title">
    Countdown 
  </div>

  <div id="countdown" class="countdown">
    <div><span id="days">0</span><small>DAYS</small></div>
    <div><span id="hours">0</span><small>HOURS</small></div>
    <div><span id="minutes">0</span><small>MINUTES</small></div>
    <div><span id="seconds">0</span><small>SECONDS</small></div>
  </div>
</div>

  <div class="languages">

    <a href="es.html" class="lang-card from-left">
      <div class="lang-image flag-mx"></div>
      <div class="lang-title">Español</div>
    </a>

    <a href="de.html" class="lang-card from-right">
      <div class="lang-image flag-de"></div>
      <div class="lang-title">Deutsch</div>
    </a>

  </div>

  

</div>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("active");
    }
  });
}, { threshold: 0.2 });

document.querySelectorAll(".reveal, .from-left, .from-right")
  .forEach(el => observer.observe(el));
</script>
<script>
const weddingDate = new Date(
  new Date().toLocaleString("en-US", {
    timeZone: "America/Mazatlan"
  }).replace(/$/, "")
);

weddingDate.setFullYear(2027);
weddingDate.setMonth(04); // April = 10
weddingDate.setDate(10);
weddingDate.setHours(18, 30, 0, 0);

function updateCountdown() {
  const now = new Date(
    new Date().toLocaleString("en-US", {
      timeZone: "America/Mazatlan"
    })
  );

  const diff = weddingDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML =
      "<strong>Heute ist unser großer Tag ❤️</strong>";
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / 1000 / 60) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").textContent = days;
  document.getElementById("hours").textContent = hours;
  document.getElementById("minutes").textContent = minutes;
  document.getElementById("seconds").textContent = seconds;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
