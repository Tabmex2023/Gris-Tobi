<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griselda & Tobias</title>

<link rel="stylesheet" href="style.css">

<script>
if(localStorage.getItem("lang")){
  window.location.href = localStorage.getItem("lang") + ".html";
}
</script>
</head>

<body class="lang-page">

<div class="lang-box">

<img src="https://flagcdn.com/w320/mx.png" class="flag">

<h2>Bitte Sprache auswählen</h2>
<p>Por favor seleccione su idioma</p>

<div class="lang-buttons">
  <button onclick="setLang('de')">Deutsch</button>
  <button onclick="setLang('es')">Español</button>
</div>

</div>

<script>
function setLang(lang){
  localStorage.setItem("lang", lang);
  window.location.href = lang + ".html";
}
</script>

</body>
</html>
